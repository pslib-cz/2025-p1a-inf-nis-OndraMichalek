<svg xmlns="http://www.w3.org/2000/svg" height="640px" style="background:#FFFFFF;" version="1.1" viewBox="0 0 960 640" width="960px">
  <defs/>
  <g>
    <text font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" x="480" y="30">6. UML Deployment Diagram - Infrastruktura systému BanManager</text>
    
    <g transform="translate(40, 100)">
      <polygon fill="#EAEAEA" points="10,-10 170,-10 160,0 0,0" style="stroke:#181818;stroke-width:1.5;"/>
      <polygon fill="#D5D5D5" points="160,0 170,-10 170,110 160,120" style="stroke:#181818;stroke-width:1.5;"/>
      <rect fill="#F1F1F1" height="120" style="stroke:#181818;stroke-width:1.5;" width="160" x="0" y="0"/>
      <text font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="80" y="25">«device»</text>
      <text font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="80" y="42">Klientský PC / Mobil</text>
      
      <rect fill="#FFFFFF" height="50" style="stroke:#555555;stroke-width:1.0;stroke-dasharray:2,2;" width="130" x="15" y="55"/>
      <text font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" x="80" y="75">«artifact»</text>
      <text font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" x="80" y="92">Web Browser</text>
    </g>

    <g transform="translate(320, 80)">
      <polygon fill="#D0D3D4" points="15,-15 475,-15 460,0 0,0" style="stroke:#181818;stroke-width:1.5"/>
      <polygon fill="#B2BABB" points="460,0 475,-15 475,485 460,500" style="stroke:#181818;stroke-width:1.5;"/>
      <rect fill="#EAEDED" height="500" style="stroke:#181818;stroke-width:1.5;" width="460" x="0" y="0"/>
      <text font-family="sans-serif" font-size="14" font-weight="bold" x="15" y="25">«execution environment»</text>
      <text font-family="sans-serif" font-size="14" font-weight="bold" x="15" y="45">Linux VPS (Docker Engine)</text>

      <g transform="translate(20, 70)">
        <polygon fill="#E5E8E8" points="10,-10 400,-10 390,0 0,0" style="stroke:#181818;stroke-width:1.0;"/>
        <polygon fill="#BDC3C7" points="390,0 400,-10 400,80 390,90" style="stroke:#181818;stroke-width:1.0;"/>
        <rect fill="#F2F3F4" height="90" style="stroke:#181818;stroke-width:1.0;" width="390" x="0" y="0"/>
        <text font-family="sans-serif" font-size="12" font-weight="bold" x="10" y="22">«container» Nginx Proxy / Static</text>
        
        <text font-family="sans-serif" font-size="11" font-style="italic" x="20" y="50">«artifact»</text>
        <text font-family="sans-serif" font-size="12" font-weight="bold" x="20" y="68">dist/ (Compiled React Frontend)</text>
      </g>

      <g transform="translate(20, 200)">
        <polygon fill="#E5E8E8" points="10,-10 400,-10 390,0 0,0" style="stroke:#181818;stroke-width:1.0;"/>
        <polygon fill="#BDC3C7" points="390,0 400,-10 400,90 390,100" style="stroke:#181818;stroke-width:1.0;"/>
        <rect fill="#F2F3F4" height="100" style="stroke:#181818;stroke-width:1.0;" width="390" x="0" y="0"/>
        <text font-family="sans-serif" font-size="12" font-weight="bold" x="10" y="22">«container» BanManager API Server</text>
        
        <text font-family="sans-serif" font-size="11" font-style="italic" x="20" y="52">«artifact»</text>
        <text font-family="sans-serif" font-size="12" font-weight="bold" x="20" y="70">banmanager-backend.jar (Spring Boot)</text>
      </g>

      <g transform="translate(20, 340)">
        <polygon fill="#E5E8E8" points="10,-10 400,-10 390,0 0,0" style="stroke:#181818;stroke-width:1.0;"/>
        <polygon fill="#BDC3C7" points="390,0 400,-10 400,100 390,110" style="stroke:#181818;stroke-width:1.0;"/>
        <rect fill="#F2F3F4" height="110" style="stroke:#181818;stroke-width:1.0;" width="390" x="0" y="0"/>
        <text font-family="sans-serif" font-size="12" font-weight="bold" x="10" y="22">«container» MySQL DBMS</text>
        
        <text font-family="sans-serif" font-size="11" font-style="italic" x="20" y="55">«database system»</text>
        <text font-family="sans-serif" font-size="12" font-weight="bold" x="20" y="75">banmanager_db (Relational Schema)</text>
      </g>
    </g>

    <g transform="translate(40, 420)">
      <polygon fill="#EAEAEA" points="10,-10 170,-10 160,0 0,0" style="stroke:#181818;stroke-width:1.5;"/>
      <polygon fill="#D5D5D5" points="160,0 170,-10 170,130 160,140" style="stroke:#181818;stroke-width:1.5;"/>
      <rect fill="#F1F1F1" height="140" style="stroke:#181818;stroke-width:1.5;" width="160" x="0" y="0"/>
      <text font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="80" y="25">«device / server»</text>
      <text font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="80" y="42">Dedicated MC Server</text>
      
      <rect fill="#FFFFFF" height="65" style="stroke:#555555;stroke-width:1.0;stroke-dasharray:2,2;" width="130" x="15" y="60"/>
      <text font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" x="80" y="78">«artifact»</text>
      <text font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" x="80" y="95">BanManager.jar</text>
      <text font-family="sans-serif" font-size="11" text-anchor="middle" x="80" y="112">(PaperMC Plugin)</text>
    </g>

    <g transform="translate(810, 240)">
      <polygon fill="#EAEAEA" points="5,-5 115,-5 110,0 0,0" style="stroke:#181818;stroke-width:1.2;"/>
      <polygon fill="#D5D5D5" points="110,0 115,-5 115,75 110,80" style="stroke:#181818;stroke-width:1.2;"/>
      <rect fill="#F9F9F9" height="80" style="stroke:#181818;stroke-width:1.2;" width="110" x="0" y="0"/>
      <text font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" x="55" y="30">«cloud service»</text>
      <text font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" x="55" y="50">Microsoft</text>
      <text font-family="sans-serif" font-size="11" text-anchor="middle" x="55" y="65">Identity Server</text>
    </g>


    <line style="stroke:#181818;stroke-width:1.5;" x1="200" x2="340" y1="160" y2="160"/>
    <text font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" x="270" y="152">HTTPs / WAN</text>
    <text font-family="sans-serif" font-size="11" text-anchor="middle" x="270" y="172">(Port 443)</text>

    <line style="stroke:#181818;stroke-width:1.5;stroke-dasharray:3,3;" x1="515" x2="515" y1="160" y2="280"/>
    <text font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="start" x="525" y="215">Reverse Proxy</text>
    <text font-family="sans-serif" font-size="11" text-anchor="start" x="525" y="230">HTTP (Port 8080)</text>

    <line style="stroke:#181818;stroke-width:1.5;stroke-dasharray:3,3;" x1="450" x2="450" y1="300" y2="420"/>
    <text font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="end" x="440" y="355">Docker Network</text>
    <text font-family="sans-serif" font-size="11" text-anchor="end" x="440" y="370">JDBC (Port 3306)</text>

    <line style="stroke:#181818;stroke-width:1.5;" x1="160" x2="340" y1="460" y2="340"/>
    <text font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" x="240" y="395">REST / TLS</text>
    <text font-family="sans-serif" font-size="11" text-anchor="middle" x="240" y="410">Port 443</text>

    <line style="stroke:#181818;stroke-width:1.5;" x1="710" x2="810" y1="280" y2="280"/>
    <text font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" x="760" y="265">HTTPS</text>
    <text font-family="sans-serif" font-size="11" text-anchor="middle" x="760" y="295">Port 443</text>

  </g>
</svg>
